name: Blueprint Pages

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.repository }}-blueprint-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Verso Blueprint Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Lake package cache
        uses: actions/cache@v4
        with:
          path: .lake/packages
          key: ${{ runner.os }}-lake-packages-v1-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}
          restore-keys: |
            ${{ runner.os }}-lake-packages-v1-

      - name: Restore Lean build cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/build/bin
            .lake/build/lib
            .lake/build/ir
          key: ${{ runner.os }}-lean-build-v1-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml', '*.lean', '**/*.lean', 'scripts/ci-verso-blueprint.sh') }}
          restore-keys: |
            ${{ runner.os }}-lean-build-v1-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-
            ${{ runner.os }}-lean-build-v1-

      - name: Show tool versions
        run: |
          lean --version
          lake --version

      - name: Build Verso blueprint site
        run: ./scripts/ci-verso-blueprint.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _out/site/html-multi

  deploy:
    name: Deploy Pages
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
